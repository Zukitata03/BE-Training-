services:
  api:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql+asyncpg://training:training@postgres:5432/training}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - MONGO_URL=${MONGO_URL:-mongodb://mongo:27017}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-CHANGE_ME_IN_PROD}
      - BLOCKCHAIN_RPC_URL=${BLOCKCHAIN_RPC_URL:-https://eth.llamarpc.com}
      - BLOCKCHAIN_RPC_URLS=${BLOCKCHAIN_RPC_URLS:-https://eth.llamarpc.com,https://rpc.ankr.com/eth}
      - BLOCKCHAIN_MAX_INDEX_BLOCK_SPAN=${BLOCKCHAIN_MAX_INDEX_BLOCK_SPAN:-10000}
  postgres:
    image: postgres:15
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=training
      - POSTGRES_PASSWORD=training
      - POSTGRES_DB=training
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U training"]
      interval: 10s
      timeout: 5s
      retries: 5
  redis:
    image: redis:7
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
  mongo:
    image: mongo:6
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.runCommand({ping:1})"]
      interval: 15s
      timeout: 5s
      retries: 3
  celery-worker:
    build: .
    command: celery -A app.tasks.celery_app.celery_app worker --loglevel=info
    depends_on:
      - redis
      - postgres
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql+asyncpg://training:training@postgres:5432/training}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - MONGO_URL=${MONGO_URL:-mongodb://mongo:27017}
      - BLOCKCHAIN_RPC_URL=${BLOCKCHAIN_RPC_URL:-https://eth.llamarpc.com}
      - BLOCKCHAIN_RPC_URLS=${BLOCKCHAIN_RPC_URLS:-https://eth.llamarpc.com,https://rpc.ankr.com/eth}
      - BLOCKCHAIN_MAX_INDEX_BLOCK_SPAN=${BLOCKCHAIN_MAX_INDEX_BLOCK_SPAN:-10000}
  celery-beat:
    build: .
    command: celery -A app.tasks.celery_app.celery_app beat --loglevel=info
    depends_on:
      - redis
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql+asyncpg://training:training@postgres:5432/training}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - MONGO_URL=${MONGO_URL:-mongodb://mongo:27017}
      - BLOCKCHAIN_RPC_URL=${BLOCKCHAIN_RPC_URL:-https://eth.llamarpc.com}
      - BLOCKCHAIN_RPC_URLS=${BLOCKCHAIN_RPC_URLS:-https://eth.llamarpc.com,https://rpc.ankr.com/eth}
      - BLOCKCHAIN_MAX_INDEX_BLOCK_SPAN=${BLOCKCHAIN_MAX_INDEX_BLOCK_SPAN:-10000}

volumes:
  postgres_data:
    driver: local
